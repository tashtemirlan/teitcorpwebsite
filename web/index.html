    <!-- ═══════════════════════════════════════
         PREMIUM LOADING SCREEN
    ═══════════════════════════════════════ -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          background: radial-gradient(circle at center, #0B0F1A 0%, #05070D 100%);
          font-family: 'Montserrat', sans-serif;
        }

        #loading {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #05070D;
          z-index: 9999;
          transition: opacity .5s ease;
        }

        #loading.hidden {
          opacity: 0;
          pointer-events: none;
        }

        .logo {
          font-size: 28px;
          font-weight: 800;
          color: #ffffff;
          letter-spacing: 2px;
          margin-bottom: 25px;
        }

        .logo span {
          color: #4DAAE8;
          text-shadow: 0 0 14px rgba(77,170,232,0.5);
        }

        .spinner {
          width: 42px;
          height: 42px;
          border: 3px solid #1A2233;
          border-top-color: #4DAAE8;
          border-radius: 50%;
          animation: spin .8s linear infinite;
        }

        .tagline {
          margin-top: 18px;
          font-size: 13px;
          color: #8FA3B8;
          letter-spacing: 1px;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }
    </style>

</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">
    <div class="logo">TEIT <span>CORP</span></div>
    <div class="spinner"></div>
    <div class="tagline">Строим будущее</div>
</div>

<script>
    window.addEventListener('flutter-first-frame', function () {
      const el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(() => el.remove(), 500);
      }
    });
</script>

<!-- FLUTTER BOOTSTRAP -->
<script src="flutter_bootstrap.js" async></script>

</body>
